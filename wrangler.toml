name = "telegram-private-chatbot"
main = "src/index.js"
compatibility_date = "2024-11-30"

[observability]
enabled = true
head_sampling_rate = 1

  [observability.logs]
  enabled = true
  head_sampling_rate = 1
  persist = true
  invocation_logs = true

  [observability.traces]
  enabled = false
  persist = true
  head_sampling_rate = 1

# --- KV 命名空间绑定 ---
# 替换 YOUR_KV_ID 为 Dashboard → KV → TOPIC_MAP → 右上角的 ID
[[kv_namespaces]]
binding = "TOPIC_MAP"
id = "YOUR_KV_ID"

# --- 环境变量 ---
# 值仅作模板占位。部署后在 Dashboard 中改成真实值，
# 只要 key 在 toml 中声明了，Dashboard 的值就不会被清除。
[vars]
BOT_TOKEN = "YOUR_BOT_TOKEN"
SUPERGROUP_ID = "-100xxxxxxxxxx"
ADMIN_IDS = ""
