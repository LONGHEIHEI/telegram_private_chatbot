name = "telegram-private-chatbot"
main = "src/index.js"
compatibility_date = "2024-11-30"

# --- KV 命名空间绑定 ---
# 取消下面注释并填写你自己的 KV Namespace ID 后即可部署。
# 也可以在 Cloudflare Dashboard → Settings → KV Namespace Bindings 手动绑定。
#[[kv_namespaces]]
#binding = "TOPIC_MAP"
#id = "YOUR_KV_NAMESPACE_ID"

# --- 环境变量 ---
# 在 Cloudflare Dashboard → Settings → Variables 中设置：
#   BOT_TOKEN, SUPERGROUP_ID, ADMIN_IDS
# 
# KV 命名空间绑定也在 Dashboard → Settings → KV Namespace Bindings 中手动添加：
#   变量名 TOPIC_MAP，选择你的 KV 命名空间。
# 
# 以上绑定一旦在 Dashboard 设置好，不会被后续的 Git 自动部署清除。
