name = "telegram-private-chatbot"
main = "src/index.js"
compatibility_date = "2024-11-30"

# --- KV 命名空间绑定 ---
# 需要在 Cloudflare Dashboard → KV 创建一个 Namespace，
# 把下面的 ID 替换成你自己的。
[[kv_namespaces]]
binding = "TOPIC_MAP"
id = "YOUR_KV_NAMESPACE_ID"

# --- 环境变量 ---
# 值留空：实际运行时从 Cloudflare Dashboard → Settings → Variables 读取。
# 在这里声明是为了防止部署后变量丢失。
[vars]
BOT_TOKEN = ""
SUPERGROUP_ID = ""
ADMIN_IDS = ""
